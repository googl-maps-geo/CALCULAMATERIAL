<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Cubiertas Pro - Canvas Edition</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM (production, free CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- html2canvas + jsPDF (free, for PDF export compatibility) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- html2pdf.js (free) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; background-color: #0f172a; }

        .label-pro { display: block; font-size: 0.75rem; font-weight: 600; color: #94a3b8; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-pro { width: 100%; padding: 0.625rem; border: 1px solid #334155; border-radius: 0.375rem; background-color: #1e293b; color: white; outline: none; font-size: 0.875rem; transition: all 0.2s; }
        .input-pro:focus { box-shadow: 0 0 0 2px #3b82f6; }

        /* Directivas Estrictas para el PDF */
        .evitar-corte {
            page-break-inside: avoid !important;
            break-inside: avoid !important;
            display: block;
        }

        /* Scrollbar styles for left panel and mobile wrapper */
        .custom-scrollbar { -webkit-overflow-scrolling: touch; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px;}
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .preview-scale {
            display: inline-block;
            transform-origin: top center;
            transform: scale(0.88);
        }

        @media (max-width: 768px) {
            .preview-scale { transform: scale(0.76); }
        }

        .pdf-exporting {
            transform: none !important;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONSTANTES Y LÓGICA DE OPTIMIZACIÓN ---
        const TEJAS_DISPONIBLES = [6.13, 5.0, 4.16, 3.70, 3.0, 2.40];
        const TRASLAPE_VERTICAL_TEJA = 0.16;
        const ANCHO_UTIL_TEJA = 0.95;
        const ANCHO_PLANCHA_TEJA = 1.05;
        const TRASLAPE_ONDAS_TEJA = 0.10;

        const METALES_DISPONIBLES = [6.0, 5.0, 4.20, 4.0, 3.0];
        const TRASLAPE_VERTICAL_METAL = 0.20;
        const ANCHO_PLANCHA_METAL = 1.10;
        const TRASLAPE_ONDAS_METAL = 0.05;
        const ANCHO_UTIL_METAL = ANCHO_PLANCHA_METAL - TRASLAPE_ONDAS_METAL;

        function optimizarPlanchas(longitud, longitudesDisponibles, traslapeVertical) {
            let restante = Math.round(longitud * 1000) / 1000;
            let mejorCombinacion = [];
            let menorDesperdicio = Infinity;

            for (let t1 of longitudesDisponibles) {
                if (t1 >= restante) {
                    let desp = t1 - restante;
                    if (desp < menorDesperdicio) { menorDesperdicio = desp; mejorCombinacion = [t1]; }
                }
            }

            for (let t1 of longitudesDisponibles) {
                for (let t2 of longitudesDisponibles) {
                    let logitudTotal = Math.round((t1 + t2 - traslapeVertical) * 1000) / 1000;
                    if (logitudTotal >= restante) {
                        let desp = logitudTotal - restante;
                        if (desp < menorDesperdicio) { menorDesperdicio = desp; mejorCombinacion = [t1, t2]; }
                    }
                }
            }

            if (menorDesperdicio > 1.5) {
                for (let t1 of longitudesDisponibles) {
                    for (let t2 of longitudesDisponibles) {
                        for (let t3 of longitudesDisponibles) {
                            let logitudTotal = Math.round((t1 + t2 + t3 - (traslapeVertical * 2)) * 1000) / 1000;
                            if (logitudTotal >= restante) {
                                let desp = logitudTotal - restante;
                                if (desp < menorDesperdicio) { menorDesperdicio = desp; mejorCombinacion = [t1, t2, t3]; }
                            }
                        }
                    }
                }
            }

            if (mejorCombinacion.length === 0) mejorCombinacion = [longitudesDisponibles[0]];
            return mejorCombinacion;
        }

        function calcularTubos6m(longitudTotalMeters) { return Math.ceil(longitudTotalMeters / 6); }

        function calcularCanales(longitud) {
            let restante = longitud;
            let c6 = 0, c5 = 0, c4 = 0, c3 = 0;
            c6 = Math.floor(restante / 6);
            restante = restante % 6;
            if (restante > 5) { c6++; restante = 0; }
            else if (restante > 4) { c5++; restante = 0; }
            else if (restante > 3) { c4++; restante = 0; }
            else if (restante > 0) { c3++; restante = 0; }
            return { c6, c5, c4, c3 };
        }

        function round2(value) {
            return Math.round(value * 100) / 100;
        }

        function resumenPiezas(piezas) {
            const mapa = {};
            piezas.forEach((p) => {
                const key = round2(p).toFixed(2);
                mapa[key] = (mapa[key] || 0) + 1;
            });
            return Object.entries(mapa)
                .map(([len, count]) => `${count} x ${len}m`)
                .join(", ");
        }

        function planCortesPerfil(piezas, kerf, largoStock = 6) {
            let unionesNecesarias = 0;
            const segmentos = [];
            piezas
                .filter((p) => p > 0)
                .forEach((len) => {
                    if (len <= largoStock) {
                        segmentos.push(len);
                        return;
                    }
                    let restante = len;
                    while (restante > largoStock + 1e-6) {
                        segmentos.push(largoStock);
                        restante -= largoStock;
                        unionesNecesarias += 1;
                    }
                    if (restante > 0) {
                        segmentos.push(restante);
                    }
                });

            const piezasOrdenadas = segmentos.sort((a, b) => b - a);

            const tubos = [];
            piezasOrdenadas.forEach((len) => {
                const lenConKerf = len + kerf;
                let colocado = false;
                for (const tubo of tubos) {
                    if (tubo.usado + lenConKerf <= largoStock + 1e-6) {
                        tubo.piezas.push(len);
                        tubo.usado += lenConKerf;
                        colocado = true;
                        break;
                    }
                }
                if (!colocado) {
                    tubos.push({ piezas: [len], usado: lenConKerf });
                }
            });

            const detalleTubos = tubos.map((t) => {
                const sobrante = Math.max(0, round2(largoStock - t.usado));
                return {
                    piezas: t.piezas.map((p) => round2(p)),
                    sobrante
                };
            });

            const totalSobrante = round2(
                detalleTubos.reduce((acc, t) => acc + t.sobrante, 0)
            );

            const sobrantesMap = {};
            detalleTubos.forEach((t) => {
                if (t.sobrante > 0) {
                    const key = round2(t.sobrante).toFixed(2);
                    sobrantesMap[key] = (sobrantesMap[key] || 0) + 1;
                }
            });

            return {
                detalleTubos,
                totalSobrante,
                totalTubos: detalleTubos.length,
                unionesNecesarias,
                sobrantesMap
            };
        }

        // --- COMPONENTES CANVAS DEDICADOS ---

        const ElevationCanvas = ({ parametros }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = 800; canvas.height = 250;
                ctx.clearRect(0, 0, 800, 250);

                ctx.strokeStyle = '#94A3B8'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(50, 200); ctx.lineTo(750, 200); ctx.stroke();

                const drawLeaderDown = (px, py, tx, ty, text, color = "#0f172a") => {
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
                    const textW = ctx.measureText(text).width;
                    const startX = tx + textW + 6;
                    const startY = ty + 2;

                    ctx.strokeStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(startX + 10, startY);
                    ctx.lineTo(px, py);
                    ctx.stroke();

                    ctx.beginPath(); ctx.arc(px, py, 2, 0, 2 * Math.PI); ctx.fillStyle = color; ctx.fill();

                    ctx.fillStyle = color;
                    ctx.fillText(text, tx, ty);
                };

                const drawDimH = (x1, x2, y, text, color = "#111") => {
                    const arrow = 4;
                    const ext = 6;
                    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x1 + arrow, y - 2); ctx.lineTo(x1 + arrow, y + 2); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x2, y); ctx.lineTo(x2 - arrow, y - 2); ctx.lineTo(x2 - arrow, y + 2); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x1, y - ext); ctx.lineTo(x1, y + ext); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x2, y - ext); ctx.lineTo(x2, y + ext); ctx.stroke();
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
                    ctx.fillText(text, (x1 + x2) / 2, y - 4);
                };

                const drawDimV = (x, y1, y2, text, color = "#111") => {
                    const arrow = 4;
                    const ext = 6;
                    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x - 2, y1 + arrow); ctx.lineTo(x + 2, y1 + arrow); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x, y2); ctx.lineTo(x - 2, y2 - arrow); ctx.lineTo(x + 2, y2 - arrow); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x - ext, y1); ctx.lineTo(x + ext, y1); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x - ext, y2); ctx.lineTo(x + ext, y2); ctx.stroke();
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
                    ctx.fillText(text, x + 6, (y1 + y2) / 2);
                };

                const drawDimSlope = (x1, y1, x2, y2, text, color = "#111") => {
                    const dx = x2 - x1;
                    const dy = y2 - y1;
                    const len = Math.hypot(dx, dy) || 1;
                    const nx = -dy / len;
                    const ny = dx / len;
                    const offset = 10;
                    const ox1 = x1 + nx * offset;
                    const oy1 = y1 + ny * offset;
                    const ox2 = x2 + nx * offset;
                    const oy2 = y2 + ny * offset;
                    const arrow = 5;

                    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(ox1, oy1); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(ox2, oy2); ctx.stroke();

                    ctx.beginPath(); ctx.moveTo(ox1, oy1); ctx.lineTo(ox2, oy2); ctx.stroke();

                    const ux = dx / len;
                    const uy = dy / len;
                    ctx.beginPath();
                    ctx.moveTo(ox1, oy1);
                    ctx.lineTo(ox1 + ux * arrow - uy * 2, oy1 + uy * arrow + ux * 2);
                    ctx.lineTo(ox1 + ux * arrow + uy * 2, oy1 + uy * arrow - ux * 2);
                    ctx.closePath(); ctx.fill();

                    ctx.beginPath();
                    ctx.moveTo(ox2, oy2);
                    ctx.lineTo(ox2 - ux * arrow - uy * 2, oy2 - uy * arrow + ux * 2);
                    ctx.lineTo(ox2 - ux * arrow + uy * 2, oy2 - uy * arrow - ux * 2);
                    ctx.closePath(); ctx.fill();

                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(text, (ox1 + ox2) / 2, (oy1 + oy2) / 2 - 6);
                };

                const drawLabel = (x, y, text, color = "#0f172a") => {
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
                    ctx.fillStyle = color;
                    ctx.fillText(text, x, y);
                };

                if (parametros.tipoTecho === '1') {
                    ctx.fillStyle = '#334155'; ctx.fillRect(150, 50, 15, 150); ctx.fillRect(550, 120, 15, 80);
                    ctx.strokeStyle = '#2563EB'; ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.moveTo(140, 50); ctx.lineTo(565, 120); ctx.stroke();
                    if (parametros.volado > 0) {
                        ctx.strokeStyle = '#EA580C'; ctx.beginPath(); ctx.moveTo(565, 120); ctx.lineTo(620, 133); ctx.stroke();
                        drawLeaderDown(620, 133, 640, 105, `Volado: ${parametros.volado}m`, "#EA580C");
                    }
                    drawDimV(115, 50, 200, `H Max: ${parametros.hAlta}m`, "#333");
                    drawDimV(585, 120, 200, `H Min: ${parametros.hBaja}m`, "#333");
                    drawDimH(150, 550, 225, `Caida Base: ${parametros.caida}m`, "#333");
                } else {
                    ctx.fillStyle = '#334155';
                    ctx.fillRect(150, 120, 15, 80);
                    if (parametros.incluirColumnasCentrales) {
                        ctx.fillRect(400, 50, 15, 150);
                    }
                    ctx.fillRect(650, 120, 15, 80);
                    ctx.strokeStyle = '#2563EB'; ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.moveTo(150, 120); ctx.lineTo(407, 50); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(407, 50); ctx.lineTo(665, 120); ctx.stroke();
                    if ((parametros.perfilViga || "").includes("75x75")) {
                        const yTensor = 95;
                        const xLeft = 150 + (yTensor - 120) * (407 - 150) / (50 - 120);
                        const xRight = 407 + (yTensor - 50) * (665 - 407) / (120 - 50);
                        ctx.strokeStyle = '#92400E'; ctx.lineWidth = 4;
                        ctx.beginPath(); ctx.moveTo(xLeft, yTensor); ctx.lineTo(xRight, yTensor); ctx.stroke();
                        drawLabel(420, 70, "Tensor 75x75", "#92400E");
                        if (parametros.tensorLongitud > 0) {
                            drawDimSlope(xLeft, yTensor, xRight, yTensor, `Tensor: ${parametros.tensorLongitud}m`, "#92400E");
                        }
                    }
                    if (parametros.volado > 0) {
                        ctx.strokeStyle = '#EA580C'; ctx.beginPath(); ctx.moveTo(95, 133); ctx.lineTo(150, 120); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(665, 120); ctx.lineTo(720, 133); ctx.stroke();
                    }
                    drawDimSlope(150, 120, 407, 50, `Caida: ${parametros.caida}m`, "#1F2937");
                    drawDimSlope(407, 50, 665, 120, `Caida: ${parametros.caida}m`, "#1F2937");
                    drawDimV(430, 50, 200, `H Centro Max: ${parametros.hAlta}m`, "#333");
                    drawDimV(135, 120, 200, `H Alero Min: ${parametros.hBaja}m`, "#333");
                    drawDimH(150, 650, 225, `Caida base (Por Lado): ${parametros.caida}m`, "#333");
                }

                const vigaAnchorX = parametros.tipoTecho === '1' ? 260 : 260;
                const vigaAnchorY = parametros.tipoTecho === '1'
                    ? (50 + (120 - 50) * (vigaAnchorX - 140) / (565 - 140))
                    : (120 + (50 - 120) * (vigaAnchorX - 150) / (407 - 150));

                drawLabel(70, 24, `Columnas: ${parametros.perfilColumna}`, "#0f172a");
                drawLabel(260, 38, `Viga: ${parametros.perfilViga}`, "#0f172a");
            }, [parametros]);
            return <canvas ref={canvasRef} className="w-full h-auto bg-white shadow-sm block" style={{maxWidth: '100%'}}></canvas>;
        };

        const ColumnsVigasCanvas = ({ resultados }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = 800; canvas.height = 250;
                ctx.fillStyle = '#f8fafc'; ctx.fillRect(0, 0, 800, 250);
                ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1; ctx.strokeRect(50, 40, 700, 160);

                const { numColumnasPorFila, parametros } = resultados;
                const segmentosCount = Math.max(1, numColumnasPorFila - 1);
                const sepBase = parametros.dividirColumnas
                    ? parametros.sepColumnasUsada
                    : parametros.sepColumnas;
                const segmentos = [];
                for (let i = 0; i < segmentosCount; i++) {
                    if (parametros.dividirColumnas) {
                        segmentos.push(sepBase);
                    } else if (i < segmentosCount - 1) {
                        segmentos.push(sepBase);
                    } else {
                        const last = Math.max(0.1, round2(parametros.largo - sepBase * (segmentosCount - 1)));
                        segmentos.push(last);
                    }
                }

                const posiciones = [0];
                segmentos.forEach((len) => {
                    posiciones.push(round2(posiciones[posiciones.length - 1] + len));
                });

                const drawLabel = (x, y, text, color = "#0f172a") => {
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
                    ctx.fillStyle = color;
                    ctx.fillText(text, x, y);
                };

                const drawDimH = (x1, x2, y, text, color = "#111") => {
                    const arrow = 4;
                    const ext = 6;
                    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x1 + arrow, y - 2); ctx.lineTo(x1 + arrow, y + 2); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x2, y); ctx.lineTo(x2 - arrow, y - 2); ctx.lineTo(x2 - arrow, y + 2); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x1, y - ext); ctx.lineTo(x1, y + ext); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x2, y - ext); ctx.lineTo(x2, y + ext); ctx.stroke();
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
                    ctx.fillText(text, (x1 + x2) / 2, y - 4);
                };

                const drawDimV = (x, y1, y2, text, color = "#111") => {
                    const arrow = 4;
                    const ext = 6;
                    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x - 2, y1 + arrow); ctx.lineTo(x + 2, y1 + arrow); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x, y2); ctx.lineTo(x - 2, y2 - arrow); ctx.lineTo(x + 2, y2 - arrow); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x - ext, y1); ctx.lineTo(x + ext, y1); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x - ext, y2); ctx.lineTo(x + ext, y2); ctx.stroke();
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
                    ctx.fillText(text, x + 6, (y1 + y2) / 2);
                };

                for (let i = 0; i < numColumnasPorFila; i++) {
                    const x = 50 + ((posiciones[i] / parametros.largo) * 700);
                    ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(x, 40); ctx.lineTo(x, 200); ctx.stroke();
                    ctx.fillStyle = '#000000'; ctx.fillRect(x - 5, 35, 10, 10); ctx.fillRect(x - 5, 195, 10, 10);
                    if (parametros.incluirColumnasCentrales) ctx.fillRect(x - 5, 115, 10, 10);

                    if (i < numColumnasPorFila - 1) {
                        ctx.strokeStyle = '#94A3B8'; ctx.lineWidth = 1;
                        const nextX = 50 + ((posiciones[i + 1] / parametros.largo) * 700);
                        ctx.beginPath(); ctx.moveTo(x, 20); ctx.lineTo(nextX, 20); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x, 15); ctx.lineTo(x, 25); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(nextX, 15); ctx.lineTo(nextX, 25); ctx.stroke();

                        const mostrarTodo = segmentosCount <= 8;
                        const esUltimo = i === segmentosCount - 1;
                        const mostrar = mostrarTodo || esUltimo;
                        if (mostrar) {
                            drawDimH(x, nextX, 20, `${round2(segmentos[i])}m`, "#111");
                        }
                    }
                }
                drawDimH(50, 750, 232, `LARGO TOTAL FRONTAL: ${parametros.largo}m`, "#111");
                drawDimV(25, 40, 200, `${parametros.caida}m`, "#111");

                drawLabel(120, 14, `Columnas: ${parametros.perfilColumna}`, "#0f172a");
                drawLabel(300, 30, `Vigas: ${parametros.perfilViga}`, "#0f172a");
            }, [resultados]);
            return <canvas ref={canvasRef} className="w-full h-auto bg-white shadow-sm block" style={{maxWidth: '100%'}}></canvas>;
        };

        const CorreasCanvas = ({ resultados }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = 800; canvas.height = 250;
                ctx.fillStyle = '#f0f9ff'; ctx.fillRect(0, 0, 800, 250);
                ctx.strokeStyle = '#bae6fd'; ctx.lineWidth = 1; ctx.strokeRect(50, 40, 700, 160);

                const { numCorreasPorAgua, parametros } = resultados;
                const totalCorreasPlano = parametros.tipoTecho === '2'
                    ? numCorreasPorAgua * 2
                    : numCorreasPorAgua;
                const pasoY = 160 / Math.max(1, totalCorreasPlano - 1);

                const drawLabel = (x, y, text, color = "#0f172a") => {
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
                    ctx.fillStyle = color;
                    ctx.fillText(text, x, y);
                };

                const drawDimV = (x, y1, y2, text, color = "#1D4ED8") => {
                    const arrow = 4;
                    const ext = 6;
                    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x - 2, y1 + arrow); ctx.lineTo(x + 2, y1 + arrow); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x, y2); ctx.lineTo(x - 2, y2 - arrow); ctx.lineTo(x + 2, y2 - arrow); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x - ext, y1); ctx.lineTo(x + ext, y1); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x - ext, y2); ctx.lineTo(x + ext, y2); ctx.stroke();
                    ctx.font = "bold 9px sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
                    ctx.fillText(text, x + 6, (y1 + y2) / 2);
                };

                const drawDimH = (x1, x2, y, text, color = "#111") => {
                    const arrow = 4;
                    const ext = 6;
                    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x1 + arrow, y - 2); ctx.lineTo(x1 + arrow, y + 2); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x2, y); ctx.lineTo(x2 - arrow, y - 2); ctx.lineTo(x2 - arrow, y + 2); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x1, y - ext); ctx.lineTo(x1, y + ext); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x2, y - ext); ctx.lineTo(x2, y + ext); ctx.stroke();
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
                    ctx.fillText(text, (x1 + x2) / 2, y - 4);
                };

                for (let i = 0; i < totalCorreasPlano; i++) {
                    const y = 40 + (i * pasoY);
                    ctx.strokeStyle = '#3B82F6'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(750, y); ctx.stroke();
                    if (i < totalCorreasPlano - 1 && i < 15 && pasoY > 12) {
                        ctx.strokeStyle = '#9CA3AF'; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(35, y); ctx.lineTo(35, y + pasoY); ctx.stroke();
                        drawDimV(30, y, y + pasoY, `${parametros.sepCorreas}m`, "#1D4ED8");
                    }
                }
                if (parametros.tipoTecho === '2') {
                    const yCumbrera = 40 + (160 / 2);
                    ctx.fillStyle = '#EF4444'; ctx.globalAlpha = 0.7; ctx.fillRect(50, yCumbrera - 3, 700, 6); ctx.globalAlpha = 1.0;
                }
                drawDimH(50, 750, 225, `Ancho cubierto: ${parametros.largo}m`, "#111");

                drawLabel(110, 16, `Correas: ${parametros.perfilCorrea}`, "#0f172a");
            }, [resultados]);
            return <canvas ref={canvasRef} className="w-full h-auto bg-white shadow-sm block" style={{maxWidth: '100%'}}></canvas>;
        };

        const TejasCanvas = ({ resultados }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = 800; canvas.height = 250;

                ctx.fillStyle = '#fffaf0';
                ctx.fillRect(0, 0, 800, 250);
                ctx.strokeStyle = '#fed7aa';
                ctx.lineWidth = 1;
                ctx.strokeRect(50, 30, 700, 200);

                const { parametros } = resultados;

                const drawDimH = (x1, x2, y, text, color = "#9a3412") => {
                    const arrow = 4;
                    const ext = 6;
                    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x1 + arrow, y - 2); ctx.lineTo(x1 + arrow, y + 2); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x2, y); ctx.lineTo(x2 - arrow, y - 2); ctx.lineTo(x2 - arrow, y + 2); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x1, y - ext); ctx.lineTo(x1, y + ext); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x2, y - ext); ctx.lineTo(x2, y + ext); ctx.stroke();
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
                    ctx.fillText(text, (x1 + x2) / 2, y - 4);
                };

                const drawDimV = (x, y1, y2, text, color = "#9a3412") => {
                    const arrow = 4;
                    const ext = 6;
                    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x - 2, y1 + arrow); ctx.lineTo(x + 2, y1 + arrow); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x, y2); ctx.lineTo(x - 2, y2 - arrow); ctx.lineTo(x + 2, y2 - arrow); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x - ext, y1); ctx.lineTo(x + ext, y1); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x - ext, y2); ctx.lineTo(x + ext, y2); ctx.stroke();
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
                    ctx.fillText(text, x + 6, (y1 + y2) / 2);
                };

                const drawPlanchaDims = (x, y, h) => {
                    if (!Array.isArray(parametros.planchasCombo) || parametros.planchasCombo.length === 0) return;
                    const segmentos = [];
                    let start = 0;
                    parametros.planchasCombo.forEach((len, idx) => {
                        const end = start + len;
                        segmentos.push([start, end]);
                        start = end - (idx < parametros.planchasCombo.length - 1 ? parametros.coberturaTraslapeVertical : 0);
                    });

                    segmentos.forEach(([s, e], idx) => {
                        const y1 = y + (s / parametros.caida) * h;
                        const y2 = y + (e / parametros.caida) * h;
                        drawDimV(x, y1, y2, `${parametros.planchasCombo[idx]}m`, "#9a3412");
                    });
                };

                ctx.font = "bold 11px sans-serif"; ctx.fillStyle = "#c2410c"; ctx.textAlign = "left";
                ctx.fillText("MODULACION EN PLANTA (PLANCHAS)", 60, 20);
                ctx.fillText("CORTE Y DETALLE DE LA ONDA (ESPANOLA)", 420, 20);

                ctx.font = "bold 10px sans-serif"; ctx.fillStyle = "#7c2d12"; ctx.textAlign = "left";
                ctx.fillText(`${parametros.coberturaNombre}: ancho util ${parametros.coberturaAnchoUtil}m`, 60, 36);

                ctx.strokeStyle = "#fed7aa"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(390, 10); ctx.lineTo(390, 240); ctx.stroke();

                const pX = 60; const pY = 45; const pW = 300; const pH = 160;

                const drawPlanta = (x, y, w, h, label) => {
                    ctx.fillStyle = "#ea580c"; ctx.globalAlpha = 0.6;
                    ctx.fillRect(x, y, w, h);
                    ctx.globalAlpha = 1.0;

                    const numPlanchasAncho = Math.ceil(parametros.largo / 0.95);
                    const colW = w / (parametros.largo / 0.95);
                    ctx.strokeStyle = "#7c2d12"; ctx.lineWidth = 1.5;
                    for(let i=0; i<=numPlanchasAncho; i++) {
                        let colX = x + (i * colW);
                        if(colX > x + w) colX = x + w;
                        ctx.beginPath(); ctx.moveTo(colX, y); ctx.lineTo(colX, y + h); ctx.stroke();
                    }

                    const numEscalones = Math.ceil(parametros.caida / 0.20);
                    const stepH = h / (parametros.caida / 0.20);
                    ctx.strokeStyle = "#c2410c"; ctx.lineWidth = 0.5;
                    for(let i=0; i<=numEscalones; i++) {
                        let rowY = y + (i * stepH);
                        if(rowY > y + h) rowY = y + h;
                        ctx.beginPath(); ctx.moveTo(x, rowY); ctx.lineTo(x + w, rowY); ctx.stroke();
                    }

                    if (label) {
                        ctx.font = "bold 9px sans-serif"; ctx.fillStyle = "#7c2d12"; ctx.textAlign = "left";
                        ctx.fillText(label, x + 6, y + 12);
                    }
                };

                if (parametros.tipoTecho === '2') {
                    const halfH = pH / 2;
                    drawPlanta(pX, pY, pW, halfH, "Agua A");
                    drawPlanta(pX, pY + halfH, pW, halfH, "Agua B");
                    ctx.strokeStyle = "#dc2626"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(pX, pY + halfH); ctx.lineTo(pX + pW, pY + halfH); ctx.stroke();
                    ctx.font = "bold 9px sans-serif"; ctx.fillStyle = "#dc2626"; ctx.textAlign = "left";
                    ctx.fillText("Cumbrera", pX + 6, pY + halfH - 4);
                    drawPlanchaDims(pX + pW + 10, pY, halfH);
                    drawPlanchaDims(pX + pW + 10, pY + halfH, halfH);
                } else {
                    drawPlanta(pX, pY, pW, pH, "");
                    drawPlanchaDims(pX + pW + 10, pY, pH);
                }

                if (Array.isArray(parametros.cortesPlanchas) && parametros.cortesPlanchas.length > 0) {
                    ctx.strokeStyle = "#1d4ed8"; ctx.lineWidth = 1; ctx.setLineDash([6, 4]);
                    parametros.cortesPlanchas.forEach((corte) => {
                        const y = pY + (corte / parametros.caida) * pH;
                        ctx.beginPath(); ctx.moveTo(pX, y); ctx.lineTo(pX + pW, y); ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.font = "bold 9px sans-serif"; ctx.fillStyle = "#1d4ed8"; ctx.textAlign = "left"; ctx.textBaseline = "bottom";
                        ctx.fillText("Union de plancha", pX + 6, y - 2);
                        ctx.setLineDash([6, 4]);
                    });
                    ctx.setLineDash([]);
                }

                drawDimH(pX, pX + pW, pY + pH + 18, `Ancho total: ${parametros.largo}m`, "#7c2d12");
                if (parametros.tipoTecho === '2') {
                    drawDimV(pX - 20, pY, pY + (pH / 2), `${parametros.caida}m`, "#7c2d12");
                    drawDimV(pX - 20, pY + (pH / 2), pY + pH, `${parametros.caida}m`, "#7c2d12");
                } else {
                    drawDimV(pX - 20, pY, pY + pH, `${parametros.caida}m`, "#7c2d12");
                }

                const dX = 420; const dY = 110;
                const dW = 300;

                ctx.font = "bold 9px sans-serif"; ctx.fillStyle = "#431407"; ctx.textAlign="left";
                ctx.fillText("CORTE TRANSVERSAL (7 Ondas Altas, 6 Concavas)", dX, 45);

                ctx.strokeStyle = "#ea580c"; ctx.lineWidth = 3;
                ctx.beginPath();

                const segW = dW / 13;
                ctx.moveTo(dX, dY);
                for(let i=0; i<13; i++) {
                    let isHigh = (i % 2 === 0);
                    let startX = dX + (i * segW);
                    let endX = startX + segW;
                    let cpX = startX + (segW/2);
                    let cpY = isHigh ? dY - 25 : dY + 5;
                    ctx.quadraticCurveTo(cpX, cpY, endX, dY);
                }
                ctx.stroke();

                ctx.strokeStyle = "#1d4ed8"; ctx.lineWidth = 2; ctx.setLineDash([4, 3]);
                ctx.beginPath();
                ctx.moveTo(dX + (11 * segW), dY - 5);
                for(let i=11; i<14; i++) {
                    let isHigh = (i % 2 === 0);
                    let startX = dX + (i * segW) - 2;
                    let endX = startX + segW;
                    let cpX = startX + (segW/2);
                    let cpY = isHigh ? (dY - 5) - 25 : (dY - 5) + 5;
                    ctx.quadraticCurveTo(cpX, cpY, endX, dY - 5);
                }
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.strokeStyle = "#94a3b8"; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(dX, dY + 20); ctx.lineTo(dX + dW, dY + 20); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(dX, dY + 15); ctx.lineTo(dX, dY + 25); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(dX + dW, dY + 15); ctx.lineTo(dX + dW, dY + 25); ctx.stroke();
                drawDimH(dX, dX + dW, dY + 20, `Ancho de la Plancha: ${parametros.coberturaAnchoPlancha}m`, "#334155");

                const traslapeX = dX + (11 * segW);
                const topCotaY = dY - 35;
                ctx.beginPath(); ctx.moveTo(traslapeX, topCotaY); ctx.lineTo(dX + dW, topCotaY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(traslapeX, topCotaY + 5); ctx.lineTo(traslapeX, topCotaY - 5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(dX + dW, topCotaY + 5); ctx.lineTo(dX + dW, topCotaY - 5); ctx.stroke();
                drawDimH(traslapeX, dX + dW, topCotaY, `Traslape: ${parametros.coberturaTraslapeOndas}m`, "#1d4ed8");

                ctx.beginPath(); ctx.moveTo(dX, topCotaY); ctx.lineTo(traslapeX, topCotaY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(dX, topCotaY + 5); ctx.lineTo(dX, topCotaY - 5); ctx.stroke();
                drawDimH(dX, traslapeX, topCotaY, `Ancho Util: ${parametros.coberturaAnchoUtil}m`, "#166534");

                const lY = 190;
                ctx.font = "bold 9px sans-serif"; ctx.fillStyle = "#431407"; ctx.textAlign="left";
                ctx.fillText("CORTE LONGITUDINAL (Paso Escalon a 20cm)", dX, 150);

                ctx.strokeStyle = "#ea580c"; ctx.lineWidth = 3;
                ctx.beginPath();
                let stepX = dX;
                ctx.moveTo(stepX, lY);
                for(let i=0; i<4; i++) {
                    ctx.lineTo(stepX + 50, lY + (i*10));
                    ctx.lineTo(stepX + 50, lY + (i*10) + 12);
                    stepX += 50;
                }
                ctx.stroke();

                ctx.strokeStyle = "#94a3b8"; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(dX, lY + 25); ctx.lineTo(dX + 50, lY + 35); ctx.stroke();
                drawDimH(dX, dX + 50, lY + 45, "Long. Onda: ~20cm", "#334155");

            }, [resultados]);
            return <canvas ref={canvasRef} className="w-full h-auto bg-white shadow-sm block" style={{maxWidth: '100%'}}></canvas>;
        };

        const CanalesCanvas = ({ resultados }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = 800; canvas.height = 130;
                ctx.clearRect(0, 0, 800, 130);
                const { parametros } = resultados;

                const drawDimH = (x1, x2, y, text, color = "#111") => {
                    const arrow = 4;
                    const ext = 6;
                    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x1 + arrow, y - 2); ctx.lineTo(x1 + arrow, y + 2); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x2, y); ctx.lineTo(x2 - arrow, y - 2); ctx.lineTo(x2 - arrow, y + 2); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(x1, y - ext); ctx.lineTo(x1, y + ext); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x2, y - ext); ctx.lineTo(x2, y + ext); ctx.stroke();
                    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
                    ctx.fillText(text, (x1 + x2) / 2, y - 4);
                };

                const drawCanal = (y) => {
                    ctx.fillStyle = '#93C5FD'; ctx.strokeStyle = '#3B82F6'; ctx.lineWidth = 1;
                    ctx.fillRect(100, y, 600, 16); ctx.strokeRect(100, y, 600, 16);

                    ctx.fillStyle = '#1E3A8A'; ctx.fillRect(96, y - 3, 4, 22); ctx.fillRect(700, y - 3, 4, 22);

                    ctx.font = "bold 10px sans-serif"; ctx.fillStyle = "#1E3A8A";
                    ctx.textAlign = "end"; ctx.fillText("Tapa Izq.", 90, y + 10);
                    ctx.textAlign = "start"; ctx.fillText("Tapa Der.", 712, y + 10);

                    ctx.fillStyle = '#BFDBFE'; ctx.strokeStyle = '#3B82F6';
                    ctx.fillRect(665, y + 16, 18, 25); ctx.strokeRect(665, y + 16, 18, 25);

                    ctx.fillStyle = '#2563EB';
                    ctx.beginPath(); ctx.moveTo(674, y + 41); ctx.lineTo(670, y + 49); ctx.lineTo(678, y + 49); ctx.fill();

                    ctx.fillStyle = '#F59E0B';
                    for (let i = 0; i < 7; i++) {
                        ctx.beginPath(); ctx.arc(100 + (i * 100), y + 8, 3.5, 0, 2 * Math.PI); ctx.fill();
                    }
                };

                if (parametros.tipoTecho === '2') {
                    drawCanal(30);
                    drawCanal(70);
                    ctx.font = "10px sans-serif"; ctx.textAlign = "center"; ctx.fillStyle = "#111";
                    ctx.fillText("Canal Alero Lado A", 400, 22);
                    ctx.fillText("Canal Alero Lado B", 400, 62);
                    drawDimH(100, 700, 112, `Longitud Desarrollo Canal (cada lado): ${parametros.largo}m`, "#111");
                } else {
                    drawCanal(50);
                    ctx.font = "10px sans-serif"; ctx.textAlign = "center"; ctx.fillStyle = "#111";
                    ctx.fillText("Ganchos de soporte cada ~2m", 400, 32);
                    drawDimH(100, 700, 95, `Longitud Desarrollo Canal: ${parametros.largo}m`, "#111");
                }
            }, [resultados]);
            return <canvas ref={canvasRef} className="w-full h-auto bg-white shadow-sm block" style={{maxWidth: '100%'}}></canvas>;
        };

        // --- APLICACION PRINCIPAL ---
        function App() {
            const [params, setParams] = useState({
                largo: "13",
                caida: "7",
                volado: "0",
                hBaja: "2.4",
                hAlta: "3.4",
                pendientePercent: "15",
                usarPendienteAuto: true,
                sepColumnas: "3.5",
                sepCorreas: "0.8",
                tipoTecho: "1",
                tipoCobertura: "teja",
                incluirColumnasCentrales: true,
                incluirCanales: true,
                dividirColumnas: false,
                incluirVigaUnion: false,
                perfilVigaUnion: "Tubo 80x40 en 2mm",
                perfilColumna: "Tubo 100x100 en 2mm",
                perfilViga: "Tubo Rectangular 100x50 en 2mm",
                perfilCorrea: "Correa Tipo G 80x40 en 2mm"
            });

            const previewCaidaRaw = Math.max(0, Number(params.caida) || 0);
            const previewCaida = params.tipoTecho === '2' ? previewCaidaRaw / 2 : previewCaidaRaw;
            const previewHBaja = Math.max(0, Number(params.hBaja) || 0);
            const previewPendiente = Math.max(0, Number(params.pendientePercent) || 0);
            const previewHAltaAuto = previewHBaja + (previewCaida * previewPendiente / 100);

            const [resultados, setResultados] = useState(null);
            const reportRef = useRef(null);

            const permiteColumnasCentrales = Number(params.largo) > 10;
            const columnasCentralesActivas = params.tipoTecho === '2' && permiteColumnasCentrales && params.incluirColumnasCentrales;
            const requiereParTensorUI = params.tipoTecho === '2' && !columnasCentralesActivas;

            useEffect(() => {
                if (requiereParTensorUI && params.perfilViga !== "Tubo 75x75 en 2mm (par + tensor)") {
                    setParams(prev => ({
                        ...prev,
                        perfilViga: "Tubo 75x75 en 2mm (par + tensor)"
                    }));
                }
            }, [requiereParTensorUI, params.perfilViga]);

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setParams(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value
                }));
            };

            const calcular = () => {
                try {
                    const vLargo = Math.max(0.1, Number(params.largo) || 0.1);
                    const vCaida = Math.max(0, Number(params.caida) || 0);
                    const vVolado = Math.max(0, Number(params.volado) || 0);
                    const vHBaja = Math.max(0, Number(params.hBaja) || 0);
                    const vPendiente = Math.max(0, Number(params.pendientePercent) || 0);
                    let vHAlta = Math.max(0.1, Number(params.hAlta) || 0.1);
                    const vSepColumnas = Math.max(0.1, Number(params.sepColumnas) || 3.5);
                    const vSepCorreas = Math.max(0.1, Number(params.sepCorreas) || 0.8);

                    const dosAguas = params.tipoTecho === '2';
                    const incluirColumnasCentrales = dosAguas && params.incluirColumnasCentrales && vLargo > 10;
                    const requiereParTensor = dosAguas && !incluirColumnasCentrales;

                    const vCaidaPorLado = dosAguas ? vCaida / 2 : vCaida;
                    if (params.usarPendienteAuto) {
                        vHAlta = Math.max(vHBaja, vHBaja + (vCaidaPorLado * vPendiente / 100));
                    }

                    const longitudInclinada = vCaidaPorLado;
                    const longitudTotalCaida = longitudInclinada + vVolado;

                    const esMetal = params.tipoCobertura === "metal";
                    const planchasDisponibles = esMetal ? METALES_DISPONIBLES : TEJAS_DISPONIBLES;
                    const traslapeVertical = esMetal ? TRASLAPE_VERTICAL_METAL : TRASLAPE_VERTICAL_TEJA;
                    const anchoUtil = esMetal ? ANCHO_UTIL_METAL : ANCHO_UTIL_TEJA;
                    const anchoPlancha = esMetal ? ANCHO_PLANCHA_METAL : ANCHO_PLANCHA_TEJA;
                    const traslapeOndas = esMetal ? TRASLAPE_ONDAS_METAL : TRASLAPE_ONDAS_TEJA;
                    const coberturaNombre = esMetal ? "Metalica 6 ondas" : "Teja Espanola";

                    const anchoTejas = Math.ceil(vLargo / anchoUtil);
                    const comboTejas = optimizarPlanchas(longitudTotalCaida, planchasDisponibles, traslapeVertical);
                    let desgloseTejas = {};
                    comboTejas.forEach(t => { desgloseTejas[t] = (desgloseTejas[t] || 0) + anchoTejas; });
                    if (dosAguas) { for (let key in desgloseTejas) desgloseTejas[key] *= 2; }

                    const cortesPlanchas = [];
                    if (comboTejas.length > 1) {
                        let acumulado = 0;
                        for (let i = 0; i < comboTejas.length - 1; i++) {
                            acumulado += comboTejas[i];
                            const posicion = Math.max(0, acumulado - traslapeVertical * (i + 1));
                            cortesPlanchas.push(posicion);
                        }
                    }

                    const totalPlanchas = Object.values(desgloseTejas).reduce((a, b) => a + b, 0);

                    let cumbreros = dosAguas ? Math.ceil(vLargo / anchoUtil) : 0;
                    let tornillosExtraCumbreros = cumbreros * 4;
                    const totalTornillos = (totalPlanchas * 9) + tornillosExtraCumbreros;

                    const numFilasColumnasProfundidad = dosAguas
                        ? (incluirColumnasCentrales ? 3 : 2)
                        : 2;
                    const numColumnasPorFila = Math.ceil(vLargo / vSepColumnas) + 1;
                    const totalColumnasNum = numColumnasPorFila * numFilasColumnasProfundidad;
                    const sepColumnasUsada = params.dividirColumnas && numColumnasPorFila > 1
                        ? round2(vLargo / (numColumnasPorFila - 1))
                        : vSepColumnas;

                    let metrosLinealesColumnas = dosAguas
                        ? (numColumnasPorFila * vHBaja * 2) + (incluirColumnasCentrales ? (numColumnasPorFila * vHAlta) : 0)
                        : (numColumnasPorFila * vHBaja) + (numColumnasPorFila * vHAlta);

                    const perfilVigaFinal = requiereParTensor
                        ? "Tubo 75x75 en 2mm (par + tensor)"
                        : params.perfilViga;
                    const usarParTensor = requiereParTensor || (perfilVigaFinal || "").includes("75x75");
                    const longitudViga = longitudTotalCaida;
                    let metrosLinealesVigas = longitudViga * numColumnasPorFila;
                    if (dosAguas) metrosLinealesVigas *= 2;
                    let tensorLongitud = 0;
                    if (usarParTensor) {
                        tensorLongitud = 1.5;
                        metrosLinealesVigas = ((longitudViga * 2) + tensorLongitud) * numColumnasPorFila;
                    }

                    const numCorreasPorAgua = Math.ceil(longitudTotalCaida / vSepCorreas) + 1;
                    let metrosLinealesCorreas = numCorreasPorAgua * vLargo;
                    if (dosAguas) metrosLinealesCorreas *= 2;

                    const metrosLinealesVigaUnion = params.incluirVigaUnion
                        ? vLargo * numFilasColumnasProfundidad
                        : 0;
                    const tubosVigaUnion = params.incluirVigaUnion
                        ? calcularTubos6m(metrosLinealesVigaUnion)
                        : 0;

                    const kerf = 0.0;
                    const piezasColumnas = [];
                    if (dosAguas) {
                        for (let i = 0; i < numColumnasPorFila * 2; i++) piezasColumnas.push(vHBaja);
                        if (incluirColumnasCentrales) {
                            for (let i = 0; i < numColumnasPorFila; i++) piezasColumnas.push(vHAlta);
                        }
                    } else {
                        for (let i = 0; i < numColumnasPorFila; i++) piezasColumnas.push(vHBaja);
                        for (let i = 0; i < numColumnasPorFila; i++) piezasColumnas.push(vHAlta);
                    }

                    const piezasVigas = [];
                    if (usarParTensor) {
                        for (let i = 0; i < numColumnasPorFila * 2; i++) piezasVigas.push(longitudViga);
                        for (let i = 0; i < numColumnasPorFila; i++) piezasVigas.push(tensorLongitud);
                    } else {
                        const totalVigas = dosAguas ? numColumnasPorFila * 2 : numColumnasPorFila;
                        for (let i = 0; i < totalVigas; i++) piezasVigas.push(longitudViga);
                    }

                    const piezasCorreas = [];
                    const totalCorreas = dosAguas ? numCorreasPorAgua * 2 : numCorreasPorAgua;
                    for (let i = 0; i < totalCorreas; i++) piezasCorreas.push(vLargo);

                    const piezasVigaUnion = [];
                    if (params.incluirVigaUnion) {
                        for (let i = 0; i < numFilasColumnasProfundidad; i++) piezasVigaUnion.push(vLargo);
                    }

                    const cortesDetalle = [
                        {
                            titulo: "Columnas",
                            perfil: params.perfilColumna,
                            piezas: piezasColumnas
                        },
                        {
                            titulo: "Vigas principales",
                            perfil: perfilVigaFinal,
                            piezas: piezasVigas
                        },
                        params.incluirVigaUnion ? {
                            titulo: "Viga de union",
                            perfil: params.perfilVigaUnion,
                            piezas: piezasVigaUnion
                        } : null,
                        {
                            titulo: "Correas",
                            perfil: params.perfilCorrea,
                            piezas: piezasCorreas
                        }
                    ].filter(Boolean).map((item) => {
                        const plan = planCortesPerfil(item.piezas, kerf, 6);
                        let recoveryUnit = 6;
                        if (item.titulo === "Columnas") {
                            recoveryUnit = Math.min(...item.piezas);
                        }
                        const stockRecuperables = Math.floor(plan.totalSobrante / recoveryUnit);
                        const sobranteRestante = round2(plan.totalSobrante - (stockRecuperables * recoveryUnit));
                        return {
                            ...item,
                            recoveryUnit,
                            totalPiezas: item.piezas.length,
                            resumen: resumenPiezas(item.piezas),
                            plan,
                            stockRecuperables,
                            sobranteRestante
                        };
                    });

                    const planColumnas = cortesDetalle.find((item) => item.titulo === "Columnas");
                    const planVigas = cortesDetalle.find((item) => item.titulo === "Vigas principales");
                    const planCorreas = cortesDetalle.find((item) => item.titulo === "Correas");
                    const planVigaUnion = cortesDetalle.find((item) => item.titulo === "Viga de union");

                    const tubosColumnas = planColumnas ? planColumnas.plan.totalTubos : 0;
                    const tubosVigas = planVigas ? planVigas.plan.totalTubos : 0;
                    const tubosCorreas = planCorreas ? planCorreas.plan.totalTubos : 0;
                    const tubosVigaUnionPlan = planVigaUnion ? planVigaUnion.plan.totalTubos : tubosVigaUnion;
                    const tubosColumnasConSobrantes = planColumnas
                        ? planColumnas.plan.totalTubos
                        : tubosColumnas;
                    const tubosCorreasConSobrantes = planCorreas
                        ? Math.max(0, planCorreas.plan.totalTubos - planCorreas.stockRecuperables)

                    let canalesDetalle = null;

                            tapas: dosAguas ? 4 : 2,
                            pitones: dosAguas ? 2 : 1,
                            ganchos: Math.ceil(longitudCanalesA_Cubrir / 2) + (dosAguas ? 2 : 1)
                        };

                        recomendaciones.push("Al no usar columnas centrales en 2 aguas, se aplica sistema par + tensor en 75x75.");
                    }

                        desgloseTejas, totalTornillos, tubosColumnas, tubosVigas, tubosCorreas,

                            incluirVigaUnion: params.incluirVigaUnion, perfilVigaUnion: params.perfilVigaUnion,
                            perfilColumna: params.perfilColumna, perfilViga: perfilVigaFinal, perfilCorrea: params.perfilCorrea,

                            coberturaTraslapeVertical: traslapeVertical,

                            planchasCombo: comboTejas
                        }
                    });

                        document.getElementById('panel-resultados')?.scrollIntoView({ behavior: 'smooth' });
                    }, 100);

                } catch (error) {

                }
            };

                // 1. Buscamos los contenedores que podrian tener desplazamiento.
                const scrollContainer = document.getElementById('panel-resultados');

                const originalScrollY = scrollContainer ? scrollContainer.scrollTop : 0;

                // Esto garantiza que la camara (html2canvas) mire exactamente el inicio del documento
                // sin capturar espacios en blanco ni empujar los margenes a la derecha.
                if (scrollContainer) scrollContainer.scrollTop = 0;
                if (scrollXContainer) scrollXContainer.scrollLeft = 0;

                };

                html2pdf().set(opt).from(element).save().then(() => {
